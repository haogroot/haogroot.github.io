baseURL = "https://haogroot.github.io/"
title = "haogroot blog"
theme = "hugo-coder"
locale = "en"
defaultContentLanguage = "en"
enableRobotsTXT = true

[pagination]
pagerSize = 20

[markup]
  [markup.highlight]
  style = "github"
  noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = true

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

[params]
author = "haogroot"
description = "haogroot's personal website"
keywords = "blog,developer,personal"
info = ["Software developer"]
since = 2019
colorScheme = "auto"
hideColorSchemeToggle = false
avatarURL = "https://www.gravatar.com/avatar/3c0da9af817dfbb20ca69a861758ae59?s=240&d=mp"

[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/haogroot/"

[[params.social]]
name = "RSS"
icon = "fa-solid fa-rss fa-2x"
weight = 2
url = "posts/index.xml"
